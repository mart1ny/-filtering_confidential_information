services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.10.5
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      APP_IMAGE: ${APP_IMAGE:-confidential-filter-service:local}
      DOCKER_URL: ${DOCKER_URL:-unix://var/run/docker.sock}
      DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
      DRIFT_MOUNT_TYPE: ${DRIFT_MOUNT_TYPE:-volume}
      DRIFT_MOUNT_SOURCE: ${DRIFT_MOUNT_SOURCE:-confidential_drift_data}
      DRIFT_MOUNT_TARGET: ${DRIFT_MOUNT_TARGET:-/var/lib/confidential-drift}
      TRAIN_DATASET_MOUNT_TYPE: ${TRAIN_DATASET_MOUNT_TYPE:-volume}
      TRAIN_DATASET_MOUNT_SOURCE: ${TRAIN_DATASET_MOUNT_SOURCE:-confidential_dataset_data}
      TRAIN_DATASET_MOUNT_TARGET: ${TRAIN_DATASET_MOUNT_TARGET:-/var/lib/confidential-dataset}
      TRAIN_DATASET_FILE: ${TRAIN_DATASET_FILE:-ds.parquet}
      TRAIN_DATASET_URI: ${TRAIN_DATASET_URI:-}
      TRAIN_ARTIFACTS_MOUNT_TYPE: ${TRAIN_ARTIFACTS_MOUNT_TYPE:-volume}
      TRAIN_ARTIFACTS_MOUNT_SOURCE: ${TRAIN_ARTIFACTS_MOUNT_SOURCE:-confidential_artifacts_data}
      TRAIN_ARTIFACTS_MOUNT_TARGET: ${TRAIN_ARTIFACTS_MOUNT_TARGET:-/var/lib/confidential-artifacts}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
    entrypoint: /bin/bash
    command: >
      -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_WEB_USER:-airflow}
      --password ${AIRFLOW_WEB_PASSWORD:-airflow}
      --firstname Air
      --lastname Flow
      --role Admin
      --email airflow@example.com"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-webserver:
    image: apache/airflow:2.10.5
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      APP_IMAGE: ${APP_IMAGE:-confidential-filter-service:local}
      DOCKER_URL: ${DOCKER_URL:-unix://var/run/docker.sock}
      DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
      DRIFT_MOUNT_TYPE: ${DRIFT_MOUNT_TYPE:-volume}
      DRIFT_MOUNT_SOURCE: ${DRIFT_MOUNT_SOURCE:-confidential_drift_data}
      DRIFT_MOUNT_TARGET: ${DRIFT_MOUNT_TARGET:-/var/lib/confidential-drift}
      TRAIN_DATASET_MOUNT_TYPE: ${TRAIN_DATASET_MOUNT_TYPE:-volume}
      TRAIN_DATASET_MOUNT_SOURCE: ${TRAIN_DATASET_MOUNT_SOURCE:-confidential_dataset_data}
      TRAIN_DATASET_MOUNT_TARGET: ${TRAIN_DATASET_MOUNT_TARGET:-/var/lib/confidential-dataset}
      TRAIN_DATASET_FILE: ${TRAIN_DATASET_FILE:-ds.parquet}
      TRAIN_DATASET_URI: ${TRAIN_DATASET_URI:-}
      TRAIN_ARTIFACTS_MOUNT_TYPE: ${TRAIN_ARTIFACTS_MOUNT_TYPE:-volume}
      TRAIN_ARTIFACTS_MOUNT_SOURCE: ${TRAIN_ARTIFACTS_MOUNT_SOURCE:-confidential_artifacts_data}
      TRAIN_ARTIFACTS_MOUNT_TARGET: ${TRAIN_ARTIFACTS_MOUNT_TARGET:-/var/lib/confidential-artifacts}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-scheduler:
    image: apache/airflow:2.10.5
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      APP_IMAGE: ${APP_IMAGE:-confidential-filter-service:local}
      DOCKER_URL: ${DOCKER_URL:-unix://var/run/docker.sock}
      DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
      DRIFT_MOUNT_TYPE: ${DRIFT_MOUNT_TYPE:-volume}
      DRIFT_MOUNT_SOURCE: ${DRIFT_MOUNT_SOURCE:-confidential_drift_data}
      DRIFT_MOUNT_TARGET: ${DRIFT_MOUNT_TARGET:-/var/lib/confidential-drift}
      TRAIN_DATASET_MOUNT_TYPE: ${TRAIN_DATASET_MOUNT_TYPE:-volume}
      TRAIN_DATASET_MOUNT_SOURCE: ${TRAIN_DATASET_MOUNT_SOURCE:-confidential_dataset_data}
      TRAIN_DATASET_MOUNT_TARGET: ${TRAIN_DATASET_MOUNT_TARGET:-/var/lib/confidential-dataset}
      TRAIN_DATASET_FILE: ${TRAIN_DATASET_FILE:-ds.parquet}
      TRAIN_DATASET_URI: ${TRAIN_DATASET_URI:-}
      TRAIN_ARTIFACTS_MOUNT_TYPE: ${TRAIN_ARTIFACTS_MOUNT_TYPE:-volume}
      TRAIN_ARTIFACTS_MOUNT_SOURCE: ${TRAIN_ARTIFACTS_MOUNT_SOURCE:-confidential_artifacts_data}
      TRAIN_ARTIFACTS_MOUNT_TARGET: ${TRAIN_ARTIFACTS_MOUNT_TARGET:-/var/lib/confidential-artifacts}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  airflow_postgres_data:
  airflow_logs:
