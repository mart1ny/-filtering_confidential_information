services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.10.5
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      APP_IMAGE: ${APP_IMAGE:-confidential-filter-service:local}
      DOCKER_URL: ${DOCKER_URL:-unix://var/run/docker.sock}
      DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
      DRIFT_MOUNT_TYPE: ${DRIFT_MOUNT_TYPE:-volume}
      DRIFT_MOUNT_SOURCE: ${DRIFT_MOUNT_SOURCE:-confidential_drift_data}
      DRIFT_MOUNT_TARGET: ${DRIFT_MOUNT_TARGET:-/var/lib/confidential-drift}
      TRAIN_DATASET_MOUNT_TYPE: ${TRAIN_DATASET_MOUNT_TYPE:-volume}
      TRAIN_DATASET_MOUNT_SOURCE: ${TRAIN_DATASET_MOUNT_SOURCE:-confidential_dataset_data}
      TRAIN_DATASET_MOUNT_TARGET: ${TRAIN_DATASET_MOUNT_TARGET:-/var/lib/confidential-dataset}
      TRAIN_DATASET_FILE: ${TRAIN_DATASET_FILE:-ds.parquet}
      TRAIN_DATASET_URI: ${TRAIN_DATASET_URI:-}
      REVIEW_MOUNT_TYPE: ${REVIEW_MOUNT_TYPE:-volume}
      REVIEW_MOUNT_SOURCE: ${REVIEW_MOUNT_SOURCE:-confidential_review_data}
      REVIEW_MOUNT_TARGET: ${REVIEW_MOUNT_TARGET:-/var/lib/confidential-review}
      REVIEW_STORAGE_DIR: ${REVIEW_STORAGE_DIR:-/var/lib/confidential-review}
      REVIEW_DATABASE_URL: ${REVIEW_DATABASE_URL:-}
      REVIEW_DB_HOST: ${REVIEW_DB_HOST:-}
      REVIEW_DB_PORT: ${REVIEW_DB_PORT:-5432}
      REVIEW_DB_NAME: ${REVIEW_DB_NAME:-}
      REVIEW_DB_USER: ${REVIEW_DB_USER:-}
      REVIEW_DB_PASSWORD: ${REVIEW_DB_PASSWORD:-}
      TRAIN_ARTIFACTS_MOUNT_TYPE: ${TRAIN_ARTIFACTS_MOUNT_TYPE:-volume}
      TRAIN_ARTIFACTS_MOUNT_SOURCE: ${TRAIN_ARTIFACTS_MOUNT_SOURCE:-confidential_artifacts_data}
      TRAIN_ARTIFACTS_MOUNT_TARGET: ${TRAIN_ARTIFACTS_MOUNT_TARGET:-/var/lib/confidential-artifacts}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      DRIFT_RESULTS_S3_URI_PREFIX: ${DRIFT_RESULTS_S3_URI_PREFIX:-}
      TRAIN_RESULTS_S3_URI_PREFIX: ${TRAIN_RESULTS_S3_URI_PREFIX:-}
      AIRFLOW_WEB_USER: ${AIRFLOW_WEB_USER:-airflow}
      AIRFLOW_WEB_PASSWORD: ${AIRFLOW_WEB_PASSWORD:-airflow}
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        /home/airflow/.local/bin/airflow db migrate
        python -c 'import textwrap; exec(textwrap.dedent("""import os
        from airflow.www.app import create_app
        from werkzeug.security import generate_password_hash

        app = create_app()
        username = os.environ.get("AIRFLOW_WEB_USER", "airflow")
        password = os.environ.get("AIRFLOW_WEB_PASSWORD", "airflow")

        with app.app_context():
            appbuilder = app.appbuilder
            sm = appbuilder.sm
            session = appbuilder.get_session
            role = sm.find_role("Admin")
            if role is None:
                raise RuntimeError("Admin role not found")
            user = sm.find_user(username=username)
            if user is None:
                user = sm.user_model()
                session.add(user)
            user.username = username
            user.first_name = "Air"
            user.last_name = "Flow"
            user.email = "airflow@example.com"
            user.active = True
            user.password = generate_password_hash(password)
            user.roles = [role]
            session.commit()
        """))'
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-webserver:
    image: apache/airflow:2.10.5
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      APP_IMAGE: ${APP_IMAGE:-confidential-filter-service:local}
      DOCKER_URL: ${DOCKER_URL:-unix://var/run/docker.sock}
      DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
      DRIFT_MOUNT_TYPE: ${DRIFT_MOUNT_TYPE:-volume}
      DRIFT_MOUNT_SOURCE: ${DRIFT_MOUNT_SOURCE:-confidential_drift_data}
      DRIFT_MOUNT_TARGET: ${DRIFT_MOUNT_TARGET:-/var/lib/confidential-drift}
      TRAIN_DATASET_MOUNT_TYPE: ${TRAIN_DATASET_MOUNT_TYPE:-volume}
      TRAIN_DATASET_MOUNT_SOURCE: ${TRAIN_DATASET_MOUNT_SOURCE:-confidential_dataset_data}
      TRAIN_DATASET_MOUNT_TARGET: ${TRAIN_DATASET_MOUNT_TARGET:-/var/lib/confidential-dataset}
      TRAIN_DATASET_FILE: ${TRAIN_DATASET_FILE:-ds.parquet}
      TRAIN_DATASET_URI: ${TRAIN_DATASET_URI:-}
      REVIEW_MOUNT_TYPE: ${REVIEW_MOUNT_TYPE:-volume}
      REVIEW_MOUNT_SOURCE: ${REVIEW_MOUNT_SOURCE:-confidential_review_data}
      REVIEW_MOUNT_TARGET: ${REVIEW_MOUNT_TARGET:-/var/lib/confidential-review}
      REVIEW_STORAGE_DIR: ${REVIEW_STORAGE_DIR:-/var/lib/confidential-review}
      REVIEW_DATABASE_URL: ${REVIEW_DATABASE_URL:-}
      REVIEW_DB_HOST: ${REVIEW_DB_HOST:-}
      REVIEW_DB_PORT: ${REVIEW_DB_PORT:-5432}
      REVIEW_DB_NAME: ${REVIEW_DB_NAME:-}
      REVIEW_DB_USER: ${REVIEW_DB_USER:-}
      REVIEW_DB_PASSWORD: ${REVIEW_DB_PASSWORD:-}
      TRAIN_ARTIFACTS_MOUNT_TYPE: ${TRAIN_ARTIFACTS_MOUNT_TYPE:-volume}
      TRAIN_ARTIFACTS_MOUNT_SOURCE: ${TRAIN_ARTIFACTS_MOUNT_SOURCE:-confidential_artifacts_data}
      TRAIN_ARTIFACTS_MOUNT_TARGET: ${TRAIN_ARTIFACTS_MOUNT_TARGET:-/var/lib/confidential-artifacts}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      DRIFT_RESULTS_S3_URI_PREFIX: ${DRIFT_RESULTS_S3_URI_PREFIX:-}
      TRAIN_RESULTS_S3_URI_PREFIX: ${TRAIN_RESULTS_S3_URI_PREFIX:-}
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-scheduler:
    image: apache/airflow:2.10.5
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      APP_IMAGE: ${APP_IMAGE:-confidential-filter-service:local}
      DOCKER_URL: ${DOCKER_URL:-unix://var/run/docker.sock}
      DOCKER_NETWORK_MODE: ${DOCKER_NETWORK_MODE:-bridge}
      DRIFT_MOUNT_TYPE: ${DRIFT_MOUNT_TYPE:-volume}
      DRIFT_MOUNT_SOURCE: ${DRIFT_MOUNT_SOURCE:-confidential_drift_data}
      DRIFT_MOUNT_TARGET: ${DRIFT_MOUNT_TARGET:-/var/lib/confidential-drift}
      TRAIN_DATASET_MOUNT_TYPE: ${TRAIN_DATASET_MOUNT_TYPE:-volume}
      TRAIN_DATASET_MOUNT_SOURCE: ${TRAIN_DATASET_MOUNT_SOURCE:-confidential_dataset_data}
      TRAIN_DATASET_MOUNT_TARGET: ${TRAIN_DATASET_MOUNT_TARGET:-/var/lib/confidential-dataset}
      TRAIN_DATASET_FILE: ${TRAIN_DATASET_FILE:-ds.parquet}
      TRAIN_DATASET_URI: ${TRAIN_DATASET_URI:-}
      REVIEW_MOUNT_TYPE: ${REVIEW_MOUNT_TYPE:-volume}
      REVIEW_MOUNT_SOURCE: ${REVIEW_MOUNT_SOURCE:-confidential_review_data}
      REVIEW_MOUNT_TARGET: ${REVIEW_MOUNT_TARGET:-/var/lib/confidential-review}
      REVIEW_STORAGE_DIR: ${REVIEW_STORAGE_DIR:-/var/lib/confidential-review}
      REVIEW_DATABASE_URL: ${REVIEW_DATABASE_URL:-}
      REVIEW_DB_HOST: ${REVIEW_DB_HOST:-}
      REVIEW_DB_PORT: ${REVIEW_DB_PORT:-5432}
      REVIEW_DB_NAME: ${REVIEW_DB_NAME:-}
      REVIEW_DB_USER: ${REVIEW_DB_USER:-}
      REVIEW_DB_PASSWORD: ${REVIEW_DB_PASSWORD:-}
      TRAIN_ARTIFACTS_MOUNT_TYPE: ${TRAIN_ARTIFACTS_MOUNT_TYPE:-volume}
      TRAIN_ARTIFACTS_MOUNT_SOURCE: ${TRAIN_ARTIFACTS_MOUNT_SOURCE:-confidential_artifacts_data}
      TRAIN_ARTIFACTS_MOUNT_TARGET: ${TRAIN_ARTIFACTS_MOUNT_TARGET:-/var/lib/confidential-artifacts}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      DRIFT_RESULTS_S3_URI_PREFIX: ${DRIFT_RESULTS_S3_URI_PREFIX:-}
      TRAIN_RESULTS_S3_URI_PREFIX: ${TRAIN_RESULTS_S3_URI_PREFIX:-}
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  airflow_postgres_data:
  airflow_logs:
