name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Validate lock file
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Black - validate code formatting
        env:
          PYLINTHOME: .pylint.d
        run: |
          echo "Black checks that Python files follow the configured code formatting."
          uv run black --check .

      - name: isort - validate import ordering
        env:
          PYLINTHOME: .pylint.d
        run: |
          echo "isort checks that imports are grouped and ordered consistently."
          uv run isort --check-only .

      - name: flake8 - validate style and basic static issues
        env:
          PYLINTHOME: .pylint.d
        run: |
          echo "flake8 checks PEP 8 style, unused imports, undefined names, and basic syntax-level issues."
          uv run flake8 app tests dags

      - name: pylint - validate code quality rules
        env:
          PYLINTHOME: .pylint.d
        run: |
          echo "pylint checks code quality rules, suspicious constructs, and maintainability issues."
          uv run pylint app

      - name: mypy - validate static typing
        env:
          PYLINTHOME: .pylint.d
        run: |
          echo "mypy checks type annotations and catches static typing mismatches."
          uv run mypy

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Validate lock file
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests with coverage gate
        run: uv run pytest

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: CI passed
        run: echo "Lint and tests passed with coverage >= 90%"

  build-and-push-image:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/confidential-filter-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/confidential-filter-service:latest

  build-and-push-frontend-image:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/confidential-filter-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/confidential-filter-frontend:latest

  transfer-model:
    name: Transfer Model Artifacts
    runs-on: ubuntu-latest
    needs: [build-and-push-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Resolve model source
        id: model-source
        env:
          MODEL_S3_URI: ${{ secrets.MODEL_S3_URI }}
        run: |
          if [ -n "${MODEL_S3_URI}" ]; then
            echo "use_remote_model=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_remote_model=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.model-source.outputs.use_remote_model != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install model download tool
        if: steps.model-source.outputs.use_remote_model != 'true'
        run: python -m pip install --upgrade pip huggingface_hub==0.28.1

      - name: Download model snapshot
        if: steps.model-source.outputs.use_remote_model != 'true'
        env:
          HF_MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download

          repo_id = os.getenv("HF_MODEL_NAME") or "distilbert-base-uncased"
          snapshot_download(
              repo_id=repo_id,
              local_dir="model_payload/model",
              local_dir_use_symlinks=False,
          )
          PY

      - name: Prepare SSH for model sync
        if: steps.model-source.outputs.use_remote_model != 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync model artifacts to remote server
        if: steps.model-source.outputs.use_remote_model != 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}/bert_classifier/model'"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" model_payload/model/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/bert_classifier/model/"

  deploy:
    name: Deploy to Remote Server
    runs-on: ubuntu-latest
    needs: [build-and-push-image, build-and-push-frontend-image, transfer-model]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH for deploy sync
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync Airflow files to remote server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}/dags' '${DEPLOY_PATH}/dataset' '${DEPLOY_PATH}/k8s'"
          rsync -az --delete --exclude='__pycache__/' --exclude='*.pyc' -e "ssh -i ~/.ssh/deploy_key" dags/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/dags/"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" k8s/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/k8s/"
          rsync -az -e "ssh -i ~/.ssh/deploy_key" docker-compose.airflow.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.airflow.yml"
          if [ -f "dataset/ds.parquet" ]; then
            rsync -az -e "ssh -i ~/.ssh/deploy_key" dataset/ds.parquet "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/dataset/ds.parquet"
          else
            echo "dataset/ds.parquet is missing, skipping dataset sync"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AIRFLOW_WEB_USER: ${{ secrets.AIRFLOW_WEB_USER }}
          AIRFLOW_WEB_PASSWORD: ${{ secrets.AIRFLOW_WEB_PASSWORD }}
          DRIFT_MOUNT_TYPE: ${{ secrets.DRIFT_MOUNT_TYPE }}
          DRIFT_MOUNT_SOURCE: ${{ secrets.DRIFT_MOUNT_SOURCE }}
          DRIFT_MOUNT_TARGET: ${{ secrets.DRIFT_MOUNT_TARGET }}
          DRIFT_RESULTS_S3_URI_PREFIX: ${{ secrets.DRIFT_RESULTS_S3_URI_PREFIX }}
          TRAIN_DATASET_MOUNT_TYPE: ${{ secrets.TRAIN_DATASET_MOUNT_TYPE }}
          TRAIN_DATASET_MOUNT_SOURCE: ${{ secrets.TRAIN_DATASET_MOUNT_SOURCE }}
          TRAIN_DATASET_MOUNT_TARGET: ${{ secrets.TRAIN_DATASET_MOUNT_TARGET }}
          TRAIN_DATASET_FILE: ${{ secrets.TRAIN_DATASET_FILE }}
          TRAIN_DATASET_URI: ${{ secrets.TRAIN_DATASET_URI }}
          REVIEW_MOUNT_TYPE: ${{ secrets.REVIEW_MOUNT_TYPE }}
          REVIEW_MOUNT_SOURCE: ${{ secrets.REVIEW_MOUNT_SOURCE }}
          REVIEW_MOUNT_TARGET: ${{ secrets.REVIEW_MOUNT_TARGET }}
          TRAIN_ARTIFACTS_MOUNT_TYPE: ${{ secrets.TRAIN_ARTIFACTS_MOUNT_TYPE }}
          TRAIN_ARTIFACTS_MOUNT_SOURCE: ${{ secrets.TRAIN_ARTIFACTS_MOUNT_SOURCE }}
          TRAIN_ARTIFACTS_MOUNT_TARGET: ${{ secrets.TRAIN_ARTIFACTS_MOUNT_TARGET }}
          TRAIN_RESULTS_S3_URI_PREFIX: ${{ secrets.TRAIN_RESULTS_S3_URI_PREFIX }}
          MODEL_S3_URI: ${{ secrets.MODEL_S3_URI }}
          REVIEW_DATABASE_URL: ${{ secrets.REVIEW_DATABASE_URL }}
          REVIEW_DB_HOST: ${{ secrets.REVIEW_DB_HOST }}
          REVIEW_DB_PORT: ${{ secrets.REVIEW_DB_PORT }}
          REVIEW_DB_NAME: ${{ secrets.REVIEW_DB_NAME }}
          REVIEW_DB_USER: ${{ secrets.REVIEW_DB_USER }}
          REVIEW_DB_PASSWORD: ${{ secrets.REVIEW_DB_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: AIRFLOW_WEB_USER,AIRFLOW_WEB_PASSWORD,DRIFT_MOUNT_TYPE,DRIFT_MOUNT_SOURCE,DRIFT_MOUNT_TARGET,DRIFT_RESULTS_S3_URI_PREFIX,TRAIN_DATASET_MOUNT_TYPE,TRAIN_DATASET_MOUNT_SOURCE,TRAIN_DATASET_MOUNT_TARGET,TRAIN_DATASET_FILE,TRAIN_DATASET_URI,REVIEW_MOUNT_TYPE,REVIEW_MOUNT_SOURCE,REVIEW_MOUNT_TARGET,TRAIN_ARTIFACTS_MOUNT_TYPE,TRAIN_ARTIFACTS_MOUNT_SOURCE,TRAIN_ARTIFACTS_MOUNT_TARGET,TRAIN_RESULTS_S3_URI_PREFIX,MODEL_S3_URI,REVIEW_DATABASE_URL,REVIEW_DB_HOST,REVIEW_DB_PORT,REVIEW_DB_NAME,REVIEW_DB_USER,REVIEW_DB_PASSWORD,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_REGION,AWS_DEFAULT_REGION,S3_ENDPOINT_URL,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -euo pipefail
            DEPLOY_BASE="${{ secrets.DEPLOY_PATH }}"
            APP_PROJECT="confidential-app"
            AIRFLOW_PROJECT="confidential-airflow"
            K8S_NAMESPACE="confidential-filter"
            KUBECONFIG_PATH="${HOME}/.kube/config"
            kctl() {
              /usr/local/bin/k3s kubectl --kubeconfig "${KUBECONFIG_PATH}" "$@"
            }
            mkdir -p "${DEPLOY_BASE}"
            cd "${DEPLOY_BASE}"
            mkdir -p bert_classifier/model
            mkdir -p "${DEPLOY_BASE}/airflow-data/postgres" "${DEPLOY_BASE}/airflow-data/logs"

            if [ ! -f "${KUBECONFIG_PATH}" ]; then
              echo "Missing ${KUBECONFIG_PATH}. Configure kubeconfig for ${USER} before running CI/CD."
              exit 1
            fi

            # Stop legacy compose stacks from earlier deploys before starting the new named projects.
            docker compose down --remove-orphans || true
            docker compose -p "${APP_PROJECT}" down --remove-orphans || true
            docker compose -f docker-compose.airflow.yml down --remove-orphans || true
            docker compose -p "${AIRFLOW_PROJECT}" -f docker-compose.airflow.yml down --remove-orphans || true

            AIRFLOW_WEB_USER_VALUE="${AIRFLOW_WEB_USER:-airflow}"
            AIRFLOW_WEB_PASSWORD_VALUE="${AIRFLOW_WEB_PASSWORD:-airflow}"
            DRIFT_MOUNT_TYPE_VALUE="${DRIFT_MOUNT_TYPE:-bind}"
            DRIFT_MOUNT_SOURCE_VALUE="${DRIFT_MOUNT_SOURCE:-${DEPLOY_BASE}/airflow-data/drift}"
            DRIFT_MOUNT_TARGET_VALUE="${DRIFT_MOUNT_TARGET:-/var/lib/confidential-drift}"
            DRIFT_RESULTS_S3_URI_PREFIX_VALUE="${DRIFT_RESULTS_S3_URI_PREFIX:-}"
            TRAIN_DATASET_MOUNT_TYPE_VALUE="${TRAIN_DATASET_MOUNT_TYPE:-bind}"
            TRAIN_DATASET_MOUNT_SOURCE_VALUE="${TRAIN_DATASET_MOUNT_SOURCE:-${DEPLOY_BASE}/dataset}"
            TRAIN_DATASET_MOUNT_TARGET_VALUE="${TRAIN_DATASET_MOUNT_TARGET:-/var/lib/confidential-dataset}"
            TRAIN_DATASET_FILE_VALUE="${TRAIN_DATASET_FILE:-ds.parquet}"
            TRAIN_DATASET_URI_VALUE="${TRAIN_DATASET_URI:-}"
            REVIEW_MOUNT_TYPE_VALUE="${REVIEW_MOUNT_TYPE:-bind}"
            REVIEW_MOUNT_SOURCE_VALUE="${REVIEW_MOUNT_SOURCE:-${DEPLOY_BASE}/review-data}"
            REVIEW_MOUNT_TARGET_VALUE="${REVIEW_MOUNT_TARGET:-/var/lib/confidential-review}"
            REVIEW_DATABASE_URL_VALUE="${REVIEW_DATABASE_URL:-}"
            REVIEW_DB_HOST_VALUE="${REVIEW_DB_HOST:-}"
            REVIEW_DB_PORT_VALUE="${REVIEW_DB_PORT:-5432}"
            REVIEW_DB_NAME_VALUE="${REVIEW_DB_NAME:-}"
            REVIEW_DB_USER_VALUE="${REVIEW_DB_USER:-}"
            REVIEW_DB_PASSWORD_VALUE="${REVIEW_DB_PASSWORD:-}"
            TRAIN_ARTIFACTS_MOUNT_TYPE_VALUE="${TRAIN_ARTIFACTS_MOUNT_TYPE:-bind}"
            TRAIN_ARTIFACTS_MOUNT_SOURCE_VALUE="${TRAIN_ARTIFACTS_MOUNT_SOURCE:-${DEPLOY_BASE}/airflow-data/artifacts}"
            TRAIN_ARTIFACTS_MOUNT_TARGET_VALUE="${TRAIN_ARTIFACTS_MOUNT_TARGET:-/var/lib/confidential-artifacts}"
            TRAIN_RESULTS_S3_URI_PREFIX_VALUE="${TRAIN_RESULTS_S3_URI_PREFIX:-}"
            MODEL_S3_URI_VALUE="${MODEL_S3_URI:-}"
            AWS_ACCESS_KEY_ID_VALUE="${AWS_ACCESS_KEY_ID:-}"
            AWS_SECRET_ACCESS_KEY_VALUE="${AWS_SECRET_ACCESS_KEY:-}"
            AWS_SESSION_TOKEN_VALUE="${AWS_SESSION_TOKEN:-}"
            AWS_REGION_VALUE="${AWS_REGION:-ru-1}"
            AWS_DEFAULT_REGION_VALUE="${AWS_DEFAULT_REGION:-${AWS_REGION_VALUE}}"
            S3_ENDPOINT_URL_VALUE="${S3_ENDPOINT_URL:-}"
            AIRFLOW_FERNET_KEY_VALUE="${{ secrets.AIRFLOW_FERNET_KEY }}"
            if [ -z "${AIRFLOW_FERNET_KEY_VALUE}" ]; then
              AIRFLOW_FERNET_KEY_VALUE="$(python3 -c 'import base64, hashlib; secret_key = """${{ secrets.SECRET_KEY }}"""; print(base64.urlsafe_b64encode(hashlib.sha256(secret_key.encode("utf-8")).digest()).decode("ascii"))')"
            fi

            print_env_status() {
              local name="$1"
              local value="${2:-}"
              if [ -n "${value}" ]; then
                echo "[env] ${name}: present"
              else
                echo "[env] ${name}: missing"
              fi
            }

            if [ -z "${MODEL_S3_URI_VALUE}" ] && [ -n "${TRAIN_RESULTS_S3_URI_PREFIX_VALUE}" ]; then
              MODEL_S3_URI_VALUE="${TRAIN_RESULTS_S3_URI_PREFIX_VALUE%/}/model"
            fi

            echo "Resolved deploy environment:"
            print_env_status "AIRFLOW_WEB_USER" "${AIRFLOW_WEB_USER_VALUE}"
            print_env_status "AIRFLOW_WEB_PASSWORD" "${AIRFLOW_WEB_PASSWORD_VALUE}"
            print_env_status "DRIFT_RESULTS_S3_URI_PREFIX" "${DRIFT_RESULTS_S3_URI_PREFIX_VALUE}"
            print_env_status "TRAIN_DATASET_URI" "${TRAIN_DATASET_URI_VALUE}"
            print_env_status "TRAIN_RESULTS_S3_URI_PREFIX" "${TRAIN_RESULTS_S3_URI_PREFIX_VALUE}"
            print_env_status "MODEL_S3_URI" "${MODEL_S3_URI_VALUE}"
            print_env_status "REVIEW_DATABASE_URL" "${REVIEW_DATABASE_URL_VALUE}"
            print_env_status "REVIEW_DB_HOST" "${REVIEW_DB_HOST_VALUE}"
            print_env_status "REVIEW_DB_PORT" "${REVIEW_DB_PORT_VALUE}"
            print_env_status "REVIEW_DB_NAME" "${REVIEW_DB_NAME_VALUE}"
            print_env_status "REVIEW_DB_USER" "${REVIEW_DB_USER_VALUE}"
            print_env_status "REVIEW_DB_PASSWORD" "${REVIEW_DB_PASSWORD_VALUE}"
            print_env_status "AWS_ACCESS_KEY_ID" "${AWS_ACCESS_KEY_ID_VALUE}"
            print_env_status "AWS_SECRET_ACCESS_KEY" "${AWS_SECRET_ACCESS_KEY_VALUE}"
            print_env_status "AWS_SESSION_TOKEN" "${AWS_SESSION_TOKEN_VALUE}"
            print_env_status "AWS_REGION" "${AWS_REGION_VALUE}"
            print_env_status "AWS_DEFAULT_REGION" "${AWS_DEFAULT_REGION_VALUE}"
            print_env_status "S3_ENDPOINT_URL" "${S3_ENDPOINT_URL_VALUE}"
            print_env_status "AIRFLOW_FERNET_KEY" "${AIRFLOW_FERNET_KEY_VALUE}"
            print_env_status "GHCR_USERNAME" "${GHCR_USERNAME:-}"
            print_env_status "GHCR_TOKEN" "${GHCR_TOKEN:-}"

            if [[ "${TRAIN_DATASET_URI_VALUE}" == s3://* || "${TRAIN_DATASET_URI_VALUE}" == s3:/* ]]; then
              if [ -z "${AWS_ACCESS_KEY_ID_VALUE}" ] || [ -z "${AWS_SECRET_ACCESS_KEY_VALUE}" ]; then
                echo "S3 dataset is configured, but AWS credentials are missing (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)."
                exit 1
              fi
              if [ -z "${S3_ENDPOINT_URL_VALUE}" ]; then
                echo "S3 dataset is configured, but S3_ENDPOINT_URL is missing."
                exit 1
              fi
            fi

            mkdir -p "${DRIFT_MOUNT_SOURCE_VALUE}" "${TRAIN_DATASET_MOUNT_SOURCE_VALUE}" "${REVIEW_MOUNT_SOURCE_VALUE}" "${TRAIN_ARTIFACTS_MOUNT_SOURCE_VALUE}"
            if [ ! -f "${TRAIN_DATASET_MOUNT_SOURCE_VALUE}/${TRAIN_DATASET_FILE_VALUE}" ] && [ -f "${DEPLOY_BASE}/dataset/ds.parquet" ]; then
              cp "${DEPLOY_BASE}/dataset/ds.parquet" "${TRAIN_DATASET_MOUNT_SOURCE_VALUE}/${TRAIN_DATASET_FILE_VALUE}"
            fi

            cat > .env <<EOF
            APP_NAME=${{ secrets.APP_NAME }}
            APP_ENV=${{ secrets.APP_ENV }}
            APP_HOST=${{ secrets.APP_HOST }}
            APP_PORT=${{ secrets.APP_PORT }}
            APP_IMAGE=ghcr.io/${{ github.repository_owner }}/confidential-filter-service:latest
            FRONTEND_PORT=${{ secrets.FRONTEND_PORT }}
            FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/confidential-filter-frontend:latest
            RISK_ALLOW_THRESHOLD=${{ secrets.RISK_ALLOW_THRESHOLD }}
            RISK_BLOCK_THRESHOLD=${{ secrets.RISK_BLOCK_THRESHOLD }}
            DETECTOR_BACKEND=hybrid
            MODEL_PATH=bert_classifier/model
            MODEL_NAME=${{ secrets.MODEL_NAME }}
            MODEL_S3_URI=${MODEL_S3_URI_VALUE}
            MODEL_DEVICE=${{ secrets.MODEL_DEVICE }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            AIRFLOW_WEB_USER=${AIRFLOW_WEB_USER_VALUE}
            AIRFLOW_WEB_PASSWORD=${AIRFLOW_WEB_PASSWORD_VALUE}
            DOCKER_URL=unix://var/run/docker.sock
            DOCKER_NETWORK_MODE=bridge
            DRIFT_MOUNT_TYPE=${DRIFT_MOUNT_TYPE_VALUE}
            DRIFT_MOUNT_SOURCE=${DRIFT_MOUNT_SOURCE_VALUE}
            DRIFT_MOUNT_TARGET=${DRIFT_MOUNT_TARGET_VALUE}
            DRIFT_RESULTS_S3_URI_PREFIX=${DRIFT_RESULTS_S3_URI_PREFIX_VALUE}
            TRAIN_DATASET_MOUNT_TYPE=${TRAIN_DATASET_MOUNT_TYPE_VALUE}
            TRAIN_DATASET_MOUNT_SOURCE=${TRAIN_DATASET_MOUNT_SOURCE_VALUE}
            TRAIN_DATASET_MOUNT_TARGET=${TRAIN_DATASET_MOUNT_TARGET_VALUE}
            TRAIN_DATASET_FILE=${TRAIN_DATASET_FILE_VALUE}
            TRAIN_DATASET_URI=${TRAIN_DATASET_URI_VALUE}
            REVIEW_MOUNT_TYPE=${REVIEW_MOUNT_TYPE_VALUE}
            REVIEW_MOUNT_SOURCE=${REVIEW_MOUNT_SOURCE_VALUE}
            REVIEW_MOUNT_TARGET=${REVIEW_MOUNT_TARGET_VALUE}
            REVIEW_STORAGE_DIR=${REVIEW_MOUNT_TARGET_VALUE}
            REVIEW_DATABASE_URL=${REVIEW_DATABASE_URL_VALUE}
            REVIEW_DB_HOST=${REVIEW_DB_HOST_VALUE}
            REVIEW_DB_PORT=${REVIEW_DB_PORT_VALUE}
            REVIEW_DB_NAME=${REVIEW_DB_NAME_VALUE}
            REVIEW_DB_USER=${REVIEW_DB_USER_VALUE}
            REVIEW_DB_PASSWORD=${REVIEW_DB_PASSWORD_VALUE}
            TRAIN_ARTIFACTS_MOUNT_TYPE=${TRAIN_ARTIFACTS_MOUNT_TYPE_VALUE}
            TRAIN_ARTIFACTS_MOUNT_SOURCE=${TRAIN_ARTIFACTS_MOUNT_SOURCE_VALUE}
            TRAIN_ARTIFACTS_MOUNT_TARGET=${TRAIN_ARTIFACTS_MOUNT_TARGET_VALUE}
            TRAIN_RESULTS_S3_URI_PREFIX=${TRAIN_RESULTS_S3_URI_PREFIX_VALUE}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID_VALUE}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY_VALUE}
            AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN_VALUE}
            AWS_REGION=${AWS_REGION_VALUE}
            AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION_VALUE}
            S3_ENDPOINT_URL=${S3_ENDPOINT_URL_VALUE}
            EOF

            if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
              echo "GHCR credentials are required for Kubernetes image pulls."
              exit 1
            fi

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            kctl apply -f k8s/namespace.yaml
            kctl -n "${K8S_NAMESPACE}" create secret docker-registry ghcr-registry \
              --docker-server=ghcr.io \
              --docker-username="${GHCR_USERNAME}" \
              --docker-password="${GHCR_TOKEN}" \
              --dry-run=client -o yaml | kctl apply -f -

            cat > k8s/secret.generated.yaml <<EOF
            apiVersion: v1
            kind: Secret
            metadata:
              name: confidential-filter-secrets
              namespace: ${K8S_NAMESPACE}
            type: Opaque
            stringData:
              SECRET_KEY: "${{ secrets.SECRET_KEY }}"
              MODEL_S3_URI: "${MODEL_S3_URI_VALUE}"
              AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID_VALUE}"
              AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY_VALUE}"
              AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN_VALUE}"
              AWS_REGION: "${AWS_REGION_VALUE}"
              AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION_VALUE}"
              S3_ENDPOINT_URL: "${S3_ENDPOINT_URL_VALUE}"
              REVIEW_DATABASE_URL: "${REVIEW_DATABASE_URL_VALUE}"
              REVIEW_DB_HOST: "${REVIEW_DB_HOST_VALUE}"
              REVIEW_DB_PORT: "${REVIEW_DB_PORT_VALUE}"
              REVIEW_DB_NAME: "${REVIEW_DB_NAME_VALUE}"
              REVIEW_DB_USER: "${REVIEW_DB_USER_VALUE}"
              REVIEW_DB_PASSWORD: "${REVIEW_DB_PASSWORD_VALUE}"
              TELEGRAM_BOT_TOKEN: "${{ secrets.TELEGRAM_BOT_TOKEN }}"
              TELEGRAM_CHAT_ID: "${{ secrets.TELEGRAM_CHAT_ID }}"
              SMTP_HOST: "${{ secrets.SMTP_HOST }}"
              SMTP_PORT: "${{ secrets.SMTP_PORT }}"
              SMTP_USERNAME: "${{ secrets.SMTP_USERNAME }}"
              SMTP_PASSWORD: "${{ secrets.SMTP_PASSWORD }}"
            EOF

            kctl apply -f k8s/secret.generated.yaml
            kctl apply -k k8s/
            if ! kctl -n "${K8S_NAMESPACE}" rollout status deployment/app --timeout=180s; then
              echo "App rollout failed"
              kctl -n "${K8S_NAMESPACE}" get pods -o wide || true
              kctl -n "${K8S_NAMESPACE}" describe deployment app || true
              kctl -n "${K8S_NAMESPACE}" describe pods -l app.kubernetes.io/name=app || true
              kctl -n "${K8S_NAMESPACE}" logs deployment/app --tail=200 || true
              exit 1
            fi
            if ! kctl -n "${K8S_NAMESPACE}" rollout status deployment/frontend --timeout=180s; then
              echo "Frontend rollout failed"
              kctl -n "${K8S_NAMESPACE}" get pods -o wide || true
              kctl -n "${K8S_NAMESPACE}" describe deployment frontend || true
              kctl -n "${K8S_NAMESPACE}" describe pods -l app.kubernetes.io/name=frontend || true
              kctl -n "${K8S_NAMESPACE}" logs deployment/frontend --tail=200 || true
              exit 1
            fi

            sed "s|__DEPLOY_BASE__|${DEPLOY_BASE}|g" k8s/airflow/postgres-deployment.yaml.template > k8s/airflow/postgres-deployment.rendered.yaml
            sed "s|__DEPLOY_BASE__|${DEPLOY_BASE}|g" k8s/airflow/airflow-init-job.yaml.template > k8s/airflow/airflow-init-job.rendered.yaml
            sed "s|__DEPLOY_BASE__|${DEPLOY_BASE}|g" k8s/airflow/airflow-webserver-deployment.yaml.template > k8s/airflow/airflow-webserver-deployment.rendered.yaml
            sed "s|__DEPLOY_BASE__|${DEPLOY_BASE}|g" k8s/airflow/airflow-scheduler-deployment.yaml.template > k8s/airflow/airflow-scheduler-deployment.rendered.yaml

            cat > k8s/airflow/airflow-secrets.generated.yaml <<EOF
            apiVersion: v1
            kind: Secret
            metadata:
              name: airflow-secrets
              namespace: ${K8S_NAMESPACE}
            type: Opaque
            stringData:
              AIRFLOW__CORE__EXECUTOR: "LocalExecutor"
              AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow"
              AIRFLOW__CORE__LOAD_EXAMPLES: "false"
              AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY_VALUE}"
              AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
              AIRFLOW__WEBSERVER__SECRET_KEY: "${{ secrets.SECRET_KEY }}"
              APP_IMAGE: "ghcr.io/${{ github.repository_owner }}/confidential-filter-service:latest"
              DOCKER_URL: "unix://var/run/docker.sock"
              DOCKER_NETWORK_MODE: "bridge"
              DRIFT_MOUNT_TYPE: "${DRIFT_MOUNT_TYPE_VALUE}"
              DRIFT_MOUNT_SOURCE: "${DRIFT_MOUNT_SOURCE_VALUE}"
              DRIFT_MOUNT_TARGET: "${DRIFT_MOUNT_TARGET_VALUE}"
              DRIFT_RESULTS_S3_URI_PREFIX: "${DRIFT_RESULTS_S3_URI_PREFIX_VALUE}"
              TRAIN_DATASET_MOUNT_TYPE: "${TRAIN_DATASET_MOUNT_TYPE_VALUE}"
              TRAIN_DATASET_MOUNT_SOURCE: "${TRAIN_DATASET_MOUNT_SOURCE_VALUE}"
              TRAIN_DATASET_MOUNT_TARGET: "${TRAIN_DATASET_MOUNT_TARGET_VALUE}"
              TRAIN_DATASET_FILE: "${TRAIN_DATASET_FILE_VALUE}"
              TRAIN_DATASET_URI: "${TRAIN_DATASET_URI_VALUE}"
              REVIEW_MOUNT_TYPE: "${REVIEW_MOUNT_TYPE_VALUE}"
              REVIEW_MOUNT_SOURCE: "${REVIEW_MOUNT_SOURCE_VALUE}"
              REVIEW_MOUNT_TARGET: "${REVIEW_MOUNT_TARGET_VALUE}"
              REVIEW_STORAGE_DIR: "${REVIEW_MOUNT_TARGET_VALUE}"
              REVIEW_DATABASE_URL: "${REVIEW_DATABASE_URL_VALUE}"
              REVIEW_DB_HOST: "${REVIEW_DB_HOST_VALUE}"
              REVIEW_DB_PORT: "${REVIEW_DB_PORT_VALUE}"
              REVIEW_DB_NAME: "${REVIEW_DB_NAME_VALUE}"
              REVIEW_DB_USER: "${REVIEW_DB_USER_VALUE}"
              REVIEW_DB_PASSWORD: "${REVIEW_DB_PASSWORD_VALUE}"
              TRAIN_ARTIFACTS_MOUNT_TYPE: "${TRAIN_ARTIFACTS_MOUNT_TYPE_VALUE}"
              TRAIN_ARTIFACTS_MOUNT_SOURCE: "${TRAIN_ARTIFACTS_MOUNT_SOURCE_VALUE}"
              TRAIN_ARTIFACTS_MOUNT_TARGET: "${TRAIN_ARTIFACTS_MOUNT_TARGET_VALUE}"
              TRAIN_RESULTS_S3_URI_PREFIX: "${TRAIN_RESULTS_S3_URI_PREFIX_VALUE}"
              AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID_VALUE}"
              AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY_VALUE}"
              AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN_VALUE}"
              AWS_REGION: "${AWS_REGION_VALUE}"
              AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION_VALUE}"
              S3_ENDPOINT_URL: "${S3_ENDPOINT_URL_VALUE}"
              AIRFLOW_WEB_USER: "${AIRFLOW_WEB_USER_VALUE}"
              AIRFLOW_WEB_PASSWORD: "${AIRFLOW_WEB_PASSWORD_VALUE}"
            EOF

            kctl apply -f k8s/airflow/postgres-service.yaml
            kctl apply -f k8s/airflow/postgres-deployment.rendered.yaml
            if ! kctl -n "${K8S_NAMESPACE}" rollout status deployment/airflow-postgres --timeout=180s; then
              echo "Airflow postgres rollout failed"
              kctl -n "${K8S_NAMESPACE}" get pods -o wide || true
              kctl -n "${K8S_NAMESPACE}" describe deployment airflow-postgres || true
              kctl -n "${K8S_NAMESPACE}" describe pods -l app.kubernetes.io/name=airflow-postgres || true
              exit 1
            fi

            kctl apply -f k8s/airflow/airflow-secrets.generated.yaml
            if kctl -n "${K8S_NAMESPACE}" get deployment airflow-webserver >/dev/null 2>&1; then
              echo "Airflow is already initialized. Skipping airflow-init job."
            else
              kctl -n "${K8S_NAMESPACE}" delete job airflow-init --ignore-not-found=true
              kctl apply -f k8s/airflow/airflow-init-job.rendered.yaml
              if ! kctl -n "${K8S_NAMESPACE}" wait --for=condition=complete --timeout=180s job/airflow-init; then
                echo "Airflow init job failed"
                kctl -n "${K8S_NAMESPACE}" get pods -o wide || true
                kctl -n "${K8S_NAMESPACE}" describe job airflow-init || true
                for pod_name in $(kctl -n "${K8S_NAMESPACE}" get pods -l job-name=airflow-init -o name || true); do
                  kctl -n "${K8S_NAMESPACE}" describe "${pod_name}" || true
                  kctl -n "${K8S_NAMESPACE}" logs "${pod_name}" --tail=200 || true
                done
                exit 1
              fi
            fi

            kctl -n "${K8S_NAMESPACE}" delete job airflow-connections-sync --ignore-not-found=true
            kctl apply -f k8s/airflow/airflow-connections-sync-job.yaml
            if ! kctl -n "${K8S_NAMESPACE}" wait --for=condition=complete --timeout=120s job/airflow-connections-sync; then
              echo "Airflow connection sync job failed"
              kctl -n "${K8S_NAMESPACE}" get pods -o wide || true
              kctl -n "${K8S_NAMESPACE}" describe job airflow-connections-sync || true
              for pod_name in $(kctl -n "${K8S_NAMESPACE}" get pods -l job-name=airflow-connections-sync -o name || true); do
                kctl -n "${K8S_NAMESPACE}" describe "${pod_name}" || true
                kctl -n "${K8S_NAMESPACE}" logs "${pod_name}" --tail=200 || true
              done
              exit 1
            fi

            kctl apply -f k8s/airflow/airflow-webserver-service.yaml
            kctl apply -f k8s/airflow/airflow-webserver-deployment.rendered.yaml
            kctl apply -f k8s/airflow/airflow-scheduler-deployment.rendered.yaml
            if ! kctl -n "${K8S_NAMESPACE}" rollout status deployment/airflow-webserver --timeout=180s; then
              echo "Airflow webserver rollout failed"
              kctl -n "${K8S_NAMESPACE}" get pods -o wide || true
              kctl -n "${K8S_NAMESPACE}" describe deployment airflow-webserver || true
              kctl -n "${K8S_NAMESPACE}" logs deployment/airflow-webserver --tail=200 || true
              exit 1
            fi
            if ! kctl -n "${K8S_NAMESPACE}" rollout status deployment/airflow-scheduler --timeout=180s; then
              echo "Airflow scheduler rollout failed"
              kctl -n "${K8S_NAMESPACE}" get pods -o wide || true
              kctl -n "${K8S_NAMESPACE}" describe deployment airflow-scheduler || true
              kctl -n "${K8S_NAMESPACE}" logs deployment/airflow-scheduler --tail=200 || true
              exit 1
            fi

            for attempt in 1 2 3 4 5; do
              if curl -fsS "http://localhost:30080/health" >/dev/null; then
                break
              fi
              echo "backend healthcheck failed (attempt ${attempt}/5), retrying..."
              sleep 5
              if [ "${attempt}" -eq 5 ]; then
                echo "Backend service is not healthy"
                kctl -n "${K8S_NAMESPACE}" get pods -o wide
                kctl -n "${K8S_NAMESPACE}" logs deployment/app --tail=200 || true
                kctl -n "${K8S_NAMESPACE}" logs deployment/frontend --tail=200 || true
                exit 1
              fi
            done

            for attempt in 1 2 3 4 5; do
              if curl -fsS -I "http://localhost:30081" >/dev/null; then
                break
              fi
              echo "frontend healthcheck failed (attempt ${attempt}/5), retrying..."
              sleep 5
              if [ "${attempt}" -eq 5 ]; then
                echo "Frontend service is not healthy"
                kctl -n "${K8S_NAMESPACE}" get pods -o wide
                kctl -n "${K8S_NAMESPACE}" logs deployment/frontend --tail=200 || true
                kctl -n "${K8S_NAMESPACE}" logs deployment/app --tail=200 || true
                exit 1
              fi
            done

            for attempt in 1 2 3 4 5 6; do
              if curl -fsS "http://localhost:30082/health" >/dev/null; then
                break
              fi
              echo "airflow healthcheck failed (attempt ${attempt}/6), retrying..."
              sleep 10
              if [ "${attempt}" -eq 6 ]; then
                echo "Airflow webserver is not healthy"
                kctl -n "${K8S_NAMESPACE}" get pods -o wide
                kctl -n "${K8S_NAMESPACE}" logs deployment/airflow-webserver --tail=200 || true
                kctl -n "${K8S_NAMESPACE}" logs deployment/airflow-scheduler --tail=200 || true
                exit 1
              fi
            done
