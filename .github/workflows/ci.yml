name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run linters
        env:
          PYLINTHOME: .pylint.d
        run: |
          uv run black --check .
          uv run isort --check-only .
          uv run flake8 app tests dags
          uv run pylint app
          uv run mypy

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.11"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests with coverage gate
        run: uv run pytest

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: CI passed
        run: echo "Lint and tests passed with coverage >= 90%"

  build-and-push-image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/confidential-filter-service:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/confidential-filter-service:latest

  transfer-model:
    name: Transfer Model Artifacts
    runs-on: ubuntu-latest
    needs: [build-and-push-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install model download tool
        run: python -m pip install --upgrade pip huggingface_hub==0.28.1

      - name: Download model snapshot
        env:
          HF_MODEL_NAME: ${{ secrets.MODEL_NAME }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download

          repo_id = os.getenv("HF_MODEL_NAME") or "distilbert-base-uncased"
          snapshot_download(
              repo_id=repo_id,
              local_dir="model_payload/model",
              local_dir_use_symlinks=False,
          )
          PY

      - name: Upload model to remote server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "model_payload/model/*"
          target: "${{ secrets.DEPLOY_PATH }}/bert_classifier/model"

  deploy:
    name: Deploy to Remote Server
    runs-on: ubuntu-latest
    needs: [build-and-push-image, transfer-model]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p bert_classifier/model
            cat > .env <<'EOF'
            APP_NAME=${{ secrets.APP_NAME }}
            APP_ENV=${{ secrets.APP_ENV }}
            APP_HOST=${{ secrets.APP_HOST }}
            APP_PORT=${{ secrets.APP_PORT }}
            APP_IMAGE=ghcr.io/${{ github.repository_owner }}/confidential-filter-service:latest
            RISK_ALLOW_THRESHOLD=${{ secrets.RISK_ALLOW_THRESHOLD }}
            RISK_BLOCK_THRESHOLD=${{ secrets.RISK_BLOCK_THRESHOLD }}
            DETECTOR_BACKEND=${{ secrets.DETECTOR_BACKEND }}
            MODEL_PATH=bert_classifier/model
            MODEL_NAME=${{ secrets.MODEL_NAME }}
            MODEL_DEVICE=${{ secrets.MODEL_DEVICE }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EOF
            cat > docker-compose.yml <<'EOF'
            services:
              app:
                image: ghcr.io/${{ github.repository_owner }}/confidential-filter-service:latest
                env_file:
                  - .env
                ports:
                  - "${APP_PORT}:8000"
                volumes:
                  - ./bert_classifier/model:/srv/app/bert_classifier/model:ro
                restart: unless-stopped
            EOF
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull app
            docker compose up -d --remove-orphans
