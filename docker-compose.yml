services:
  app:
    image: ${APP_IMAGE:-confidential-filter-service:local}
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    image: ${FRONTEND_IMAGE:-confidential-filter-frontend:local}
    build:
      context: ./frontend
    depends_on:
      - app
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
